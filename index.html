<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 北海道之旅</title>

  <!-- PWA / iOS 主畫面設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="北海道2026">
  <meta name="theme-color" content="#4a7fba">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" id="pwa-manifest">
  <!-- App icon (inline SVG as data URL) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%234a7fba'/%3E%3Ctext x='50%25' y='58%25' font-size='90' text-anchor='middle' dominant-baseline='middle'%3E🗾%3C/text%3E%3Ctext x='50%25' y='82%25' font-size='22' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3E北海道%3C/text%3E%3C/svg%3E">

  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --fuji:    #4a7fba;
  --fuji-d:  #2e5f96;
  --fuji-l:  #cfe2f5;
  --fuji-xl: #eef5fc;
  --warm:    #f6f2eb;
  --gray-1:  #ede9e2;
  --gray-2:  #b8b0a8;
  --gray-3:  #807870;
  --ink:     #2a2420;
  --gold:    #e0982a;
  --green:   #5a9870;
  --red:     #d05040;
  --r: 16px;
  --r-lg: 22px;
  --shadow: 0 4px 20px rgba(74,127,186,0.13);
  --shadow-sm: 0 2px 10px rgba(74,127,186,0.09);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
  background: var(--warm);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 90px;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    radial-gradient(circle at 15% 15%, rgba(74,127,186,.05) 0%, transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(224,152,42,.05) 0%, transparent 45%),
    url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cellipse cx='25' cy='25' rx='3.5' ry='5' fill='%234a7fba' fill-opacity='.04' transform='rotate(-20 25 25)'/%3E%3Cellipse cx='75' cy='60' rx='3.5' ry='5' fill='%23e0982a' fill-opacity='.04' transform='rotate(15 75 60)'/%3E%3Ccircle cx='50' cy='85' r='2' fill='%234a7fba' fill-opacity='.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
}

/* ── HERO ── */
#hero {
  position:relative;
  background:linear-gradient(160deg,#2c5891 0%,#4a7fba 55%,#6fa8d8 100%);
  padding:44px 20px 72px;
  text-align:center;
  overflow:hidden;
  z-index:1;
}
.hero-blob {
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,.06); pointer-events:none;
}
.hero-blob.b1 { width:220px;height:220px;top:-80px;right:-50px; }
.hero-blob.b2 { width:130px;height:130px;bottom:30px;left:-40px; }
.hero-badge {
  display:inline-block;
  background:rgba(255,255,255,.18); color:white;
  font-size:.68rem; font-weight:700; letter-spacing:.2em;
  padding:5px 16px; border-radius:20px; margin-bottom:14px;
  border:1px solid rgba(255,255,255,.25);
}
.hero-title {
  font-size:clamp(1.8rem,7vw,3rem); font-weight:700;
  color:white; line-height:1.2; letter-spacing:.06em; margin-bottom:10px;
  text-shadow:0 2px 16px rgba(0,0,0,.2);
}
.hero-sub { font-size:.83rem; color:rgba(255,255,255,.8); letter-spacing:.14em; margin-bottom:18px; }
.hero-pills { display:flex; gap:7px; justify-content:center; flex-wrap:wrap; }
.hero-pill {
  background:rgba(255,255,255,.15); color:rgba(255,255,255,.92);
  font-size:.7rem; padding:4px 12px; border-radius:20px;
  border:1px solid rgba(255,255,255,.2);
}
.hero-wave { position:absolute; bottom:0; left:0; right:0; height:48px; }

/* ── LAYOUT ── */
#main-page, #day-page { position:relative; z-index:1; }
.inner { max-width:860px; margin:0 auto; padding:0 14px; }

/* ── SECTION LABEL ── */
.sec-label {
  text-align:center; font-size:.7rem; font-weight:700;
  letter-spacing:.25em; color:var(--fuji);
  padding:20px 14px 12px;
  display:flex; align-items:center; gap:10px;
}
.sec-label::before,.sec-label::after {
  content:''; flex:1; height:1.5px;
  background:linear-gradient(to right,transparent,var(--fuji-l),transparent);
}

/* ── TIPS ── */
.tips-card {
  background:white; border-radius:var(--r);
  padding:13px 15px; margin:0 0 14px;
  display:flex; align-items:flex-start; gap:10px;
  box-shadow:var(--shadow-sm); border-left:4px solid var(--gold);
}
.tips-icon { font-size:1.2rem; flex-shrink:0; margin-top:1px; }
.tips-ttl { font-size:.72rem; font-weight:700; color:var(--gold); margin-bottom:2px; }
.tips-txt { font-size:.76rem; color:var(--gray-3); line-height:1.6; }

/* ── DAYS GRID ── */
.days-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:11px;
}
@media(min-width:560px){ .days-grid{ grid-template-columns:repeat(3,1fr); } }
@media(min-width:780px){ .days-grid{ grid-template-columns:repeat(4,1fr); } }

/* ── DAY CARD ── */
.day-card {
  background:white; border-radius:var(--r-lg);
  overflow:hidden; cursor:pointer;
  transition:transform .2s ease,box-shadow .2s ease;
  box-shadow:var(--shadow-sm);
}
.day-card:hover { transform:translateY(-4px) scale(1.015); box-shadow:var(--shadow); }
.day-card:active { transform:scale(.97); }
.dc-top { height:6px; }
.dc-body { padding:13px 13px 9px; }
.dc-emoji { font-size:1.75rem; display:block; margin-bottom:5px; }
.dc-num { font-size:.58rem; font-weight:700; color:var(--gray-2); letter-spacing:.15em; }
.dc-date { font-size:1.15rem; font-weight:700; color:var(--ink); line-height:1.1; margin:2px 0 3px; }
.dc-city { font-size:.88rem; font-weight:700; color:var(--fuji-d); }
.dc-theme { font-size:.66rem; color:var(--gray-3); margin:2px 0 7px; }
.dc-hl { display:flex; flex-direction:column; gap:3px; }
.dc-hl-item { font-size:.65rem; color:var(--gray-3); display:flex; align-items:center; gap:4px; }
.dc-hl-item::before { content:'•'; color:var(--fuji); font-size:.75em; }
.dc-footer {
  padding:7px 13px; border-top:1px solid var(--gray-1);
  font-size:.63rem; color:var(--gray-2);
  display:flex; justify-content:space-between; align-items:center;
}
.dc-wx {
  font-size:.66rem; color:var(--fuji-d);
  display:flex; align-items:center; gap:3px;
  background:var(--fuji-xl); padding:2px 7px; border-radius:8px;
}

/* ── DAY DETAIL ── */
#day-page { max-width:680px; margin:0 auto; padding:0 14px 40px; }
.day-header {
  border-radius:0 0 var(--r-lg) var(--r-lg);
  padding:20px 20px 20px; color:white;
  margin-bottom:14px; position:relative; overflow:hidden;
}
.day-header::before {
  content:''; position:absolute;
  width:170px;height:170px; border-radius:50%;
  background:rgba(255,255,255,.07);
  top:-65px; right:-45px;
}
.dh-num { font-size:.66rem; opacity:.8; letter-spacing:.15em; margin-bottom:2px; }
.dh-city { font-size:1.75rem; font-weight:700; line-height:1.1; }
.dh-theme { font-size:.83rem; opacity:.85; margin-top:3px; }
.dh-wx {
  display:flex; align-items:center; gap:10px;
  margin-top:13px; padding:10px 13px;
  background:rgba(255,255,255,.15); border-radius:var(--r);
  border:1px solid rgba(255,255,255,.2);
}
.dh-wx-icon { font-size:1.75rem; }
.dh-wx-info { flex:1; }
.dh-wx-temp { font-size:1rem; font-weight:700; }
.dh-wx-desc { font-size:.7rem; opacity:.85; margin-top:1px; }
.dh-wx-link {
  font-size:.63rem; color:rgba(255,255,255,.82); text-decoration:none;
  border:1px solid rgba(255,255,255,.3); padding:4px 9px;
  border-radius:10px; white-space:nowrap;
}
.dh-wx-link:hover { background:rgba(255,255,255,.2); }

/* ── LEGEND ── */
.legend {
  display:flex; gap:10px; flex-wrap:wrap;
  padding:0 2px 12px; justify-content:center;
}
.leg { display:flex; align-items:center; gap:4px; font-size:.66rem; color:var(--gray-3); }
.leg-dot { width:8px; height:8px; border-radius:50%; }

/* ── TIMELINE ── */
.timeline { position:relative; }
.tl-item { position:relative; padding-left:26px; margin-bottom:8px; }
.tl-item::before {
  content:''; position:absolute;
  left:7px; top:22px; bottom:-8px;
  width:2px;
  background:linear-gradient(to bottom,var(--fuji-l),transparent);
}
.tl-item:last-child::before { display:none; }
.tl-dot {
  position:absolute; left:1px; top:14px;
  width:13px; height:13px; border-radius:50%;
  background:white; border:2.5px solid var(--fuji-l); z-index:1;
}
.tl-dot.tp-spot     { border-color:var(--red);    background:#fff0ee; }
.tl-dot.tp-food     { border-color:var(--gold);   background:#fff8ee; }
.tl-dot.tp-hotel    { border-color:#8a70c8;       background:#f0eeff; }
.tl-dot.tp-transport{ border-color:var(--fuji);   background:var(--fuji-xl); }

.tl-card {
  background:white; border-radius:var(--r);
  padding:10px 13px; box-shadow:var(--shadow-sm);
  display:flex; gap:10px; align-items:flex-start;
}
.tl-time { font-size:.6rem; color:var(--gray-2); min-width:38px; padding-top:3px; flex-shrink:0; white-space:nowrap; }
.tl-body { flex:1; min-width:0; }
.tl-name { font-size:.84rem; font-weight:500; line-height:1.4; }
.tl-note { font-size:.72rem; color:var(--gray-3); margin-top:3px; line-height:1.5; }
.tl-links { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
.tl-btn {
  display:inline-flex; align-items:center; gap:3px;
  font-size:.65rem; padding:3px 9px; border-radius:10px;
  text-decoration:none; transition:all .15s; white-space:nowrap;
  font-family:inherit;
}
.tl-btn.map      { background:var(--fuji-xl); color:var(--fuji-d); border:1px solid var(--fuji-l); }
.tl-btn.map:hover{ background:var(--fuji); color:white; }
.tl-btn.offi     { background:#fff0e8; color:var(--red); border:1px solid #ffd0b8; }
.tl-btn.offi:hover{ background:var(--red); color:white; }

/* ── SPOT CARD ── */
.spot-card {
  background:white; border-radius:var(--r);
  overflow:hidden; box-shadow:var(--shadow-sm);
  border-top:4px solid var(--red);
}
.spot-head { padding:12px 13px 0; }
.spot-se { font-size:1.55rem; flex-shrink:0; }
.spot-ht { flex:1; }
.spot-time { font-size:.6rem; color:var(--gray-2); margin-bottom:2px; }
.spot-name { font-size:.97rem; font-weight:700; line-height:1.3; }
.spot-pill {
  display:inline-flex; align-items:center; gap:3px;
  font-size:.63rem; font-weight:700;
  padding:2px 8px; border-radius:8px; margin-top:4px;
}
.spot-desc { padding:8px 13px; font-size:.77rem; color:#555; line-height:1.75; }
.spot-note { padding:0 13px 6px; font-size:.71rem; color:var(--gray-3); line-height:1.5; }
.spot-foot {
  padding:7px 13px 11px;
  display:flex; flex-wrap:wrap; gap:5px;
  border-top:1px dashed var(--gray-1);
}

/* ── BOTTOM NAV ── */
#bottom-nav {
  position:fixed; bottom:14px;
  left:50%; transform:translateX(-50%);
  background:white; border-radius:30px;
  box-shadow:0 8px 32px rgba(74,127,186,.22), 0 2px 8px rgba(0,0,0,.07);
  display:flex; align-items:center; padding:5px 7px;
  z-index:100; border:1px solid var(--fuji-l);
  max-width:calc(100vw - 28px);
  overflow-x:auto;
}
#bottom-nav::-webkit-scrollbar { display:none; }
.nav-btn {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:6px 9px; border-radius:22px; cursor:pointer;
  transition:all .18s; min-width:42px; border:none;
  background:none; font-family:inherit; flex-shrink:0;
}
.nav-btn:hover { background:var(--fuji-xl); }
.nav-btn.active { background:var(--fuji); }
.nav-btn.active .nav-em { color:white; }
.nav-btn.active .nav-lb { color:white; }
.nav-em { font-size:.72rem; font-weight:700; line-height:1; color:var(--fuji-d); }
.nav-lb { font-size:.5rem; color:var(--gray-3); white-space:nowrap; }
.nav-sep { width:1px; height:26px; background:var(--gray-1); margin:0 2px; flex-shrink:0; }

/* ── PAGE ANIM ── */
#main-page, #day-page { animation:fadeUp .22s ease both; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

.page-foot {
  text-align:center; padding:14px;
  font-size:.63rem; color:var(--gray-2); letter-spacing:.05em;
}

/* ── FOOD PAGE ── */
#food-page { display:none; position:relative; z-index:1; max-width:680px; margin:0 auto; padding:0 14px 40px; }

.food-header {
  background:linear-gradient(155deg,#8a3a2a,#c05a40);
  border-radius:0 0 var(--r-lg) var(--r-lg);
  padding:20px 20px 22px; color:white; margin-bottom:16px;
  position:relative; overflow:hidden;
}
.food-header::before {
  content:''; position:absolute;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.07); top:-60px;right:-40px;
}
.food-header-label { font-size:.66rem; opacity:.8; letter-spacing:.15em; margin-bottom:2px; }
.food-header-title { font-size:1.75rem; font-weight:700; }
.food-header-sub { font-size:.8rem; opacity:.8; margin-top:4px; }

.food-cat { margin-bottom:20px; }
.food-cat-title {
  font-size:.72rem; font-weight:700; letter-spacing:.2em;
  color:var(--fuji-d); padding:14px 2px 8px;
  display:flex; align-items:center; gap:8px;
}
.food-cat-title::after { content:''; flex:1; height:1px; background:var(--fuji-l); }

.food-list { display:flex; flex-direction:column; gap:7px; }

.food-item {
  background:white; border-radius:var(--r);
  padding:11px 14px; box-shadow:var(--shadow-sm);
  display:flex; align-items:center; gap:10px;
}
.food-item.fav { border-left:3px solid #e8702a; }
.food-fav { color:#e8702a; font-size:.65rem; font-weight:700; flex-shrink:0; background:#fff3ee; padding:2px 6px; border-radius:6px; }
.food-name { flex:1; font-size:.85rem; font-weight:500; line-height:1.35; }
.food-note { font-size:.68rem; color:var(--gray-3); margin-top:2px; }
.food-map {
  display:inline-flex; align-items:center; gap:3px;
  font-size:.65rem; padding:4px 10px; border-radius:10px;
  text-decoration:none; white-space:nowrap; flex-shrink:0;
  background:var(--fuji-xl); color:var(--fuji-d);
  border:1px solid var(--fuji-l); transition:all .15s;
  font-family:inherit;
}
.food-map:hover { background:var(--fuji); color:white; }

/* Main page food button */
.food-entry-btn {
  display:flex; align-items:center; justify-content:space-between;
  background:white; border-radius:var(--r); padding:14px 16px;
  margin:0 0 14px; box-shadow:var(--shadow-sm);
  cursor:pointer; border:none; width:100%; font-family:inherit;
  border-left:4px solid #c05a40; transition:all .15s;
}
.food-entry-btn:hover { box-shadow:var(--shadow); transform:translateY(-1px); }
.feb-left { text-align:left; }
.feb-title { font-size:.88rem; font-weight:700; color:#8a3a2a; }
.feb-sub { font-size:.7rem; color:var(--gray-3); margin-top:2px; }
.feb-arrow { font-size:1rem; color:var(--gray-2); }

/* ── SHOP PAGE ── */
#shop-page { display:none; position:relative; z-index:1; }

.shop-header {
  background:linear-gradient(155deg,#2a6845,#3d9060);
  padding:20px 20px 22px; color:white;
  border-radius:0 0 var(--r-lg) var(--r-lg);
  margin-bottom:0; position:relative; overflow:hidden;
}
.shop-header::before {
  content:''; position:absolute; width:160px;height:160px;
  border-radius:50%; background:rgba(255,255,255,.07); top:-60px;right:-40px;
}
.shop-header-label { font-size:.66rem; opacity:.8; letter-spacing:.15em; margin-bottom:2px; }
.shop-header-title { font-size:1.75rem; font-weight:700; }
.shop-header-sub { font-size:.8rem; opacity:.8; margin-top:4px; }

#shop-map {
  height: 380px;
  width: 100%;
  position: relative;
  z-index: 2;
}

.shop-list-section {
  max-width:680px; margin:0 auto; padding:0 14px 40px;
}

.shop-area-cards { display:flex; flex-direction:column; gap:8px; margin-top:12px; }

.shop-area-card {
  background:white; border-radius:var(--r);
  box-shadow:var(--shadow-sm); overflow:hidden;
  cursor:pointer; transition:box-shadow .18s;
}
.shop-area-card:hover { box-shadow:var(--shadow); }
.shop-area-card.active { box-shadow:0 0 0 2px var(--fuji); }

.sac-head {
  display:flex; align-items:center; gap:10px;
  padding:11px 14px;
}
.sac-num {
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:.72rem; font-weight:700; color:white; flex-shrink:0;
}
.sac-area { font-size:.88rem; font-weight:700; flex:1; }
.sac-count { font-size:.68rem; color:var(--gray-3); }
.sac-arrow { font-size:.8rem; color:var(--gray-2); transition:transform .2s; }
.shop-area-card.active .sac-arrow { transform:rotate(90deg); }

.sac-items {
  display:none; border-top:1px solid var(--gray-1);
  padding:8px 14px 12px; gap:4px; flex-direction:column;
}
.shop-area-card.active .sac-items { display:flex; }

.sac-item {
  display:flex; align-items:center; gap:8px;
  padding:6px 0; border-bottom:1px solid var(--gray-1);
  text-decoration:none; color:inherit;
}
.sac-item:last-child { border-bottom:none; }
.sac-item-name { flex:1; font-size:.82rem; color:var(--ink); line-height:1.3; }
.sac-item-sub { font-size:.68rem; color:var(--gray-3); }
.sac-item-map {
  font-size:.63rem; padding:3px 8px; border-radius:8px;
  text-decoration:none; white-space:nowrap; flex-shrink:0;
  background:var(--fuji-xl); color:var(--fuji-d);
  border:1px solid var(--fuji-l); transition:all .15s;
}
.sac-item-map:hover { background:var(--fuji); color:white; }

/* Custom Leaflet marker */
.shop-marker {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:.72rem; font-weight:700; color:white;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
  border:2px solid white;
  cursor:pointer;
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
</head>
<body>

<div id="hero">
  <div class="hero-blob b1"></div>
  <div class="hero-blob b2"></div>
  <div class="hero-badge">✈ HOKKAIDO JOURNEY 2026</div>
  <div class="hero-title">北海道之旅</div>
  <div class="hero-sub">2026年 3月29日 → 4月5日　8天7夜</div>
  <div class="hero-pills">
    <span class="hero-pill">函館</span>
    <span class="hero-pill">洞爺湖</span>
    <span class="hero-pill">札幌</span>
    <span class="hero-pill">小樽</span>
  </div>
  <svg class="hero-wave" viewBox="0 0 1200 48" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,48 L0,26 Q80,6 160,22 Q240,36 320,18 Q410,2 500,18 Q590,32 670,16 Q760,0 850,16 Q930,30 1020,14 Q1110,0 1160,14 L1200,10 L1200,48Z" fill="#f6f2eb"/>
  </svg>
</div>

<div id="main-page">
  <div class="inner">
    <div class="sec-label">行程總覽</div>
    <div class="tips-card">
      
      <div>
        <div class="tips-ttl">函館市電搭乘提示</div>
        <div class="tips-txt">後門上車，前門下車，刷西瓜卡（Suica）。</div>
      </div>
    </div>
    <button class="food-entry-btn" onclick="showFood()">

let shopMap = null;
let shopMarkers = [];
let activeAreaId = null;

function gmap2(q){ return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`; }

function initShopMap() {
  if (shopMap) { shopMap.invalidateSize(); return; }
  if (typeof L === 'undefined') {
    document.getElementById('shop-map').innerHTML =
      '<div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;background:#eef5fc;color:#4a7fba;font-size:.85rem;">' +
      '<div style="font-size:1.5rem">🗺️</div>' +
      '<div style="font-weight:700">地圖需要網路環境才能顯示</div>' +
      '<div style="font-size:.75rem;color:#888">請下載 HTML 後用瀏覽器開啟</div>' +
      '</div>';
    return;
  }
  try {
  shopMap = L.map('shop-map', { zoomControl:true, scrollWheelZoom:true })
    .setView([43.064, 141.353], 14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap contributors',
    maxZoom:19
  }).addTo(shopMap);

  SHOP_AREAS.forEach(area => {
    const el = document.createElement('div');
    el.className = 'shop-marker';
    el.style.background = area.color;
    el.textContent = area.id;

    const icon = L.divIcon({ html:el, className:'', iconSize:[28,28], iconAnchor:[14,14] });
    const marker = L.marker([area.lat, area.lng], {icon}).addTo(shopMap);

    marker.on('click', () => {
      toggleArea(area.id);
      shopMap.setView([area.lat, area.lng], 16, {animate:true});
    });

    shopMarkers.push({id:area.id, marker});
  });
  } catch(e) {
    document.getElementById('shop-map').innerHTML =
      '<div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;background:#eef5fc;color:#4a7fba;font-size:.85rem;">' +
      '<div style="font-size:1.5rem">🗺️</div>' +
      '<div style="font-weight:700">地圖載入失敗</div>' +
      '<div style="font-size:.75rem;color:#888">請下載 HTML 後用瀏覽器開啟</div>' +
      '</div>';
  }
}

function toggleArea(id) {
  const cards = document.querySelectorAll('.shop-area-card');
  cards.forEach(c => {
    if (parseInt(c.dataset.id) === id) {
      const isActive = c.classList.contains('active');
      c.classList.toggle('active', !isActive);
      activeAreaId = isActive ? null : id;
    } else {
      c.classList.remove('active');
    }
  });
  // scroll card into view
  const target = document.querySelector(`.shop-area-card[data-id="${id}"]`);
  if (target) target.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function buildShopCards() {
  document.getElementById('shop-area-cards').innerHTML = SHOP_AREAS.map(area => `
    <div class="shop-area-card" data-id="${area.id}" onclick="onAreaClick(${area.id})">
      <div class="sac-head">
        <div class="sac-num" style="background:${area.color}">${area.id}</div>
        <div class="sac-area">${area.area}</div>
        <div class="sac-count">${area.stores.length} 間店</div>
        <div class="sac-arrow">›</div>
      </div>
      <div class="sac-items">
        ${area.stores.map(s=>`
          <div class="sac-item">
            <div style="flex:1;min-width:0">
              <div class="sac-item-name">${s.name}</div>
              ${s.sub?`<div class="sac-item-sub">${s.sub}</div>`:''}
            </div>
            <a class="sac-item-map" href="${gmap2(s.mq)}" target="_blank" onclick="event.stopPropagation()">📍 地圖</a>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function onAreaClick(id) {
  toggleArea(id);
  if (shopMap) {
    const area = SHOP_AREAS.find(a=>a.id===id);
    shopMap.setView([area.lat, area.lng], 16, {animate:true});
  }
}

  const linksHtml=links.length?`<div class="tl-links">${links.join('')}</div>`:'';

  if(isSpot){return`<div class="tl-item">
    <div class="tl-dot tp-spot"></div>
    <div class="spot-card" style="border-top-color:${item.hc||day.color}">
      <div class="spot-head">
        
        <div class="spot-ht">
          <div class="spot-time">${item.t||''}</div>
          <div class="spot-name">${item.n}</div>
          ${item.hl?`<div class="spot-pill" style="background:${item.hc||day.color}22;color:${item.hc||day.color}">✦ ${item.hl}</div>`:''}
        </div>
      </div>
      <div class="spot-desc">${item.desc}</div>
      ${item.note?`<div class="spot-note">${item.note}</div>`:''}
      ${links.length?`<div class="spot-foot">${links.join('')}</div>`:''}
    </div>
  </div>`;}

  return`<div class="tl-item">
    <div class="tl-dot tp-${item.tp}"></div>
    <div class="tl-card">
      <div class="tl-time">${item.t||''}</div>
      <div class="tl-body">
        <div class="tl-name">${item.n}</div>
        ${item.note?`<div class="tl-note">${item.note}</div>`:''}
        ${linksHtml}
      </div>
    </div>
  </div>`;
}

let curId=null;

function showMain(){
  curId=null;
  document.getElementById('main-page').style.display='block';
  document.getElementById('day-page').style.display='none';
  document.getElementById('food-page').style.display='none';
  document.getElementById('shop-page').style.display='none';
  setActive('home');
  window.scrollTo({top:0,behavior:'smooth'});
}

function showDay(id){
  curId=id;
  const day=DAYS.find(d=>d.id===id);
  if(!day)return;
  document.getElementById('main-page').style.display='none';
  document.getElementById('day-page').style.display='block';
  document.getElementById('food-page').style.display='none';
  document.getElementById('shop-page').style.display='none';
  window.scrollTo({top:0});
  setActive(id);
  document.getElementById('day-content').innerHTML=`
    <div class="day-header" style="background:${day.bg}">
      <div class="dh-num">${day.num} / ${day.date}（${day.wd}）</div>
      <div class="dh-city">${day.city}</div>
      <div class="dh-theme">${day.theme}</div>
      <div class="dh-wx">
        <div class="dh-wx-icon">${day.wx.icon}</div>
        <div class="dh-wx-info">
          <div class="dh-wx-temp">${day.wx.lo}° / ${day.wx.hi}°C</div>
          <div class="dh-wx-desc">${day.wx.desc} · 降雨機率 ${day.wx.rain}% · ${day.wx.city}</div>
        </div>
        <a class="dh-wx-link" href="${day.wx.url}" target="_blank">🌐 詳細天氣</a>
      </div>
    </div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--red)"></div>景點</div>
      <div class="leg"><div class="leg-dot" style="background:var(--gold)"></div>餐飲</div>
      <div class="leg"><div class="leg-dot" style="background:#8a70c8"></div>住宿</div>
      <div class="leg"><div class="leg-dot" style="background:var(--fuji)"></div>交通</div>
    </div>
    <div class="timeline">${day.items.map(i=>renderItem(i,day)).join('')}</div>
  `;
}

function setActive(key){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const el=key==='home'
    ?document.getElementById('nav-home')
    :key==='food'
    ?document.getElementById('nav-food')
    :key==='shop'
    ?document.getElementById('nav-shop')
    :document.querySelector(`.nav-btn[data-id="${key}"]`);
  if(el)el.classList.add('active');
}

function buildAll(){
  // grid
  document.getElementById('days-grid').innerHTML=DAYS.map(d=>`
    <div class="day-card" onclick="showDay(${d.id})">
      <div class="dc-top" style="background:${d.color}"></div>
      <div class="dc-body">
        
        <div class="dc-num">${d.num}</div>
        <div class="dc-date">${d.date}（${d.wd}）</div>
        <div class="dc-city">${d.city}</div>
        <div class="dc-theme">${d.theme}</div>
        <div class="dc-hl">${d.hl.map(h=>`<div class="dc-hl-item">${h}</div>`).join('')}</div>
      </div>
      <div class="dc-footer">
        <div class="dc-wx">${d.wx.icon} ${d.wx.lo}°/${d.wx.hi}°C</div>
        <span>→</span>
      </div>
    </div>
  `).join('');
  // nav
  const nav=document.getElementById('day-nav');
  nav.innerHTML=DAYS.map((d,i)=>`
    ${i===0?'<div class="nav-sep"></div>':''}
    <button class="nav-btn" data-id="${d.id}" onclick="showDay(${d.id})">
      <span class="nav-em">${d.num.replace("Day ","D")}</span>
      <span class="nav-lb">${d.date}</span>
    </button>
  `).join('');
}

buildAll();
buildShopCards();
</script>
